<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Portfolio</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Proximity prompt – shown when player is near a pedestal -->
    <div id="proximity-ui" class="proximity-ui" aria-live="polite" aria-atomic="true">
      <p id="proximity-label" class="proximity-label"></p>
    </div>

    <!-- Project modal – shown when player presses E near a pedestal -->
    <div id="project-modal" class="project-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="modal-title" class="modal-title"></h2>
          <div id="modal-accent-bar" class="modal-accent-bar"></div>
        </div>
        <p id="modal-description" class="modal-description"></p>
        <div class="modal-actions">
          <a id="project-link" class="modal-link-btn" href="#" target="_blank" rel="noopener noreferrer">
            View Project
            <svg class="modal-link-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <button id="modal-close" class="modal-close-btn" aria-label="Close modal">
            Close <span class="key-badge">Esc</span>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
